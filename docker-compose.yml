version: '3.8'

services:
  neo4j:
    image: neo4j:5.14
    container_name: oag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./scripts/init_neo4j.cypher:/var/lib/neo4j/import/init.cypher
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - oag-network

  postgres:
    image: postgres:15
    container_name: oag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oag
      POSTGRES_PASSWORD: oag123
      POSTGRES_DB: oag_metadata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oag-network

  redis:
    image: redis:7
    container_name: oag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - oag-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oag-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - DATABASE_URL=postgresql://oag:oag123@postgres:5432/oag_metadata
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - oag-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oag-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - oag-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: oag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - oag-network
    restart: unless-stopped
    profiles:
      - production

networks:
  oag-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
